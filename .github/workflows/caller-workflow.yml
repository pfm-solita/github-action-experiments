# Caller Workflow A
#
# This workflow demonstrates calling a reusable workflow and conditionally
# running a follow-up job based on whether the reusable workflow reported a failure.
#
# Workflow B's job uses continue-on-error: true, which causes the workflow run
# itself to succeed even when a step fails. To detect the actual failure,
# Workflow B exposes the job result as an output that this workflow reads.

name: Caller Workflow A

on:
  workflow_dispatch:

permissions: {}

jobs:
  # Job that calls the reusable Workflow B
  call-workflow-b:
    uses: ./.github/workflows/reusable-workflow.yml

  # This job only runs if Workflow B reported a failure via its output.
  # Because Workflow B's job has continue-on-error: true, the workflow run
  # passes even when a step fails, so we check the explicit output instead
  # of relying on if: failure().
  handle-failure:
    runs-on: ubuntu-latest
    needs: call-workflow-b
    if: ${{ needs.call-workflow-b.outputs.job-result == 'failure' }}
    permissions: {}

    steps:
      - name: Handle Workflow B failure
        run: echo "Workflow B reported a failure - running failure-handling logic"
