name: Caller With Retry Example

# Demonstrates calling a reusable workflow and retrying it once if it fails.
#
# How the retry works:
#   1. `first-attempt`  – calls the reusable workflow.  The reusable workflow
#      uses `continue-on-error: true` internally and exposes a `result` output
#      ('success' or 'failure') so that its failure does NOT mark the workflow
#      run as failed immediately.
#   2. `retry-on-failure` – only runs when `first-attempt`'s `result` output
#      is 'failure', calling the reusable workflow a second time.
#   3. `workflow-conclusion` – always runs last.  It checks the `result`
#      outputs of both attempts and fails only when both failed.
#
# Using `continue-on-error: true` inside the reusable workflow (rather than
# relying on `if: failure()` in downstream jobs) is necessary because GitHub
# Actions marks the entire workflow run as failed the moment any job fails –
# even if a later retry job succeeds.  By preventing `first-attempt` from
# ever failing the run, and delegating the pass/fail decision to
# `workflow-conclusion`, the run correctly reflects the final outcome.

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'Simulate a failure in the first attempt to trigger the retry'
        required: false
        type: boolean
        default: false
      simulate_failure_on_retry:
        description: 'Simulate a failure in the retry attempt'
        required: false
        type: boolean
        default: false

jobs:
  first-attempt:
    uses: ./.github/workflows/reusable-example.yml
    with:
      message: 'First attempt – running the reusable workflow'
      simulate_failure: ${{ inputs.simulate_failure }}

  retry-on-failure:
    needs: first-attempt
    # Only run this job when the first attempt reported a real failure via its
    # output.  We check the output (not the job result) because the reusable
    # workflow uses `continue-on-error: true`, so `first-attempt` always shows
    # a job result of 'success' – the output is the only reliable signal.
    if: needs.first-attempt.outputs.result == 'failure'
    uses: ./.github/workflows/reusable-example.yml
    with:
      message: 'Retry attempt – the first attempt failed, trying again'
      simulate_failure: ${{ inputs.simulate_failure_on_retry }}

  workflow-conclusion:
    needs: [first-attempt, retry-on-failure]
    # Always run so we can evaluate the combined result of both attempts.
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check workflow result
        run: |
          first="${{ needs.first-attempt.outputs.result }}"
          retry="${{ needs.retry-on-failure.outputs.result }}"
          echo "first-attempt result: $first"
          echo "retry-on-failure result: $retry"
          if [[ "$first" == "success" || "$retry" == "success" ]]; then
            echo "Workflow succeeded."
          else
            echo "Workflow failed – all attempts failed."
            exit 1
          fi
